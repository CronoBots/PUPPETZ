name: Refresh leaderboard data

# Rafraîchit le classement Puppetz (data.json) et le commit si les
# rangs des holders ont réellement changé. L'index (index.html) charge ce
# data.json en direct via fetch — plus aucune donnée n'est cuite dans l'index.
#
# IMPORTANT : tourne sur un RUNNER SELF-HOSTED installé sur le PC de l'auteur.
# crypto.com renvoie des 429 (Too Many Requests) aux IP de datacenter de
# GitHub : l'agrégation ne fonctionne que depuis une IP résidentielle.

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC (s'exécute quand le runner est en ligne)
  workflow_dispatch:       # bouton « Run workflow » manuel
    inputs:
      skip_twitter:
        description: "Ne pas récupérer les liens X/Twitter (moins de requêtes, plus sûr si l'IP est limitée)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: self-hosted   # PC de l'auteur (IP résidentielle, non bloquée par crypto.com)
    timeout-minutes: 60
    # Toutes les étapes `run:` tournent sous cmd, PAS sous Windows PowerShell.
    # Raison (vérifiée sur les logs) : l'Execution Policy PowerShell de la machine
    # est sur "Restricted", donc powershell.exe REFUSE d'exécuter le .ps1 que GitHub
    # génère pour chaque étape `run:` (PSSecurityException / UnauthorizedAccess :
    # « l'exécution de scripts est désactivée sur ce système ») → l'étape échoue
    # en ~0,4 s avant même de lancer la commande. cmd génère un .cmd lancé par
    # cmd.exe, qui n'a pas d'Execution Policy → contournement propre et stable.
    # (Alternative côté machine : Set-ExecutionPolicy RemoteSigned -Scope LocalMachine.)
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      # Owners.json (cache des handles Twitter/X) est désormais committé dans le
      # repo (seed de 748 propriétaires) → le checkout le fournit, pas besoin de
      # cache des Actions (qui pouvait restaurer un cache partiel d'un run échoué).

      - name: Build data.json
        run: node Test.js
        env:
          # Mode doux : concurrence 1 + backoff/pauses rallongés → débit de requêtes bas,
          # évite les 429/1015 de crypto.com (surtout si l'IP est en pénalité Cloudflare).
          GENTLE: '1'
          # Skip des liens X/Twitter (gros multiplicateur de requêtes) si demandé au lancement manuel.
          SKIP_TWITTER: ${{ inputs.skip_twitter }}
          # Clé API Explorer Cronos (mints V3 fiables pour le Sales Bot). Optionnelle :
          # sans elle, Test.js retombe sur la lecture on-chain via RPC.
          CRONOS_EXPLORER_API_KEY: ${{ secrets.CRONOS_EXPLORER_API_KEY }}

      - name: Commit data.json si le classement a changé
        run: node .github/commit-data.js
